DATA_FS:
  RAW_DATA_DIR: '/datasets/HERMES-CR-120-OBST/rawData/'
  AGG_DATA_DIR: '/datasets/HERMES-CR-120-OBST/aggData/'
  PICKLE_DIR: '/datasets/HERMES-CR-120-OBST/processed/'
  OUTPUT_DIR : "output_hermes_cr_120_obst"
  SAVE_DIR: "trained_models/hermes_cr_120_obst/"
  USE_PICKLE: False
MACROPROPS:
  # Grid size
  ROWS: 28
  COLS: 24
  # Grid resolution
  DX: 0.5
  DY: 0.5
  LU:
    - -5
    - 8
  # EPSILON value to avoid division by cero
  EPS: 0.000001
  STRIDE: 10    # Stride to use to use most out provided data.
  THETA: 0
  TIME_RES: 0.25
DATASET:
  NAME: "HERMES-CR-120-OBST"
  PAST_LEN: 5
  FUTURE_LEN: 3
  RAW_SEQ_LEN: 20
  TRAIN_FILE_COUNT: 18
  VAL_FILE_COUNT: 2
  TEST_FILE_COUNT: 2
  BATCH_SIZE: 64
  params:
    shuffle: True
    num_workers: 6
    drop_last: True
  DATASET_TYPE: 'BySplitRatio'    # Available options: ByFilenames|BySplitRatio|ByFilenames4Test
  VELOCITY_NORM: False
MODEL:
  NAME: "{}_HERMESCR120-OBST_TE{}_PL{}_FL{}_CE{}_{}.pth"
  NSAMPLES: 1280      # Define number of predicted samples (64 BS * 20 rep, default values)
  NSAMPLES4PLOTS: 20  # Define number of predicted samples to plot static and dynamic seqs
  DDPM:
    SAMPLER: "DDPM"     # Available options: DDPM|DDIM
    TIMESTEPS: 1000     # Define canonical number of diffusion timesteps
    SCALE: 0.5          # Define scale for betas in model
    DDIM_DIVIDER: 2     # Define number of timesteps for taus subset
    GUIDANCE: 'None'    # Possible values: None, Sparsity, mass_preservation
    MODEL_SAMPLES: 7
    UNET:
      CONDITION: "Past"
      CONDITION_HANDLING: "embed"
      NUM_RES_BLOCKS: 1
      BASE_CH: 32  # 64, 128, 256, 512
      BASE_CH_MULT: [1, 2, 4] # 32, 16, 8, 4
      APPLY_ATTENTION: [False, False, True, False]
      DROPOUT_RATE: 0.1
      TIME_EMB_MULT: 4 # 128
      TRAIN:
        EPOCHS: 200
        SOLVER:
          LR: 0.00005
          WEIGHT_DECAY: 0.003
          BETAS:
            - 0.5
            - 0.999
          SCHEDULER:
            FACTOR: 0.5       # halve LR on plateau
            PATIENCE: 10      # wait 10 epochs of no improvement before reducing
            MIN_LR: 0.000001  # floor so LR never dies completely
    DIT:
      CONDITION: "Past"
      PATCH_SIZE: 4      # With ROWS=28, COLS=24 and PATCH_SIZE=4 → 7×6 = 42 mprops seq tokens.
      T_PATCH_SIZE: 2    # Temporal patch size
      HIDDEN_SIZE: 256   # model width; try 512 for more capacity
      DEPTH:       6     # number of DiT blocks
      NUM_HEADS:   4     # HIDDEN_SIZE % NUM_HEADS must == 0
      MLP_RATIO:   4.0
      DROPOUT_RATE: 0.1
      TIME_EMB_MULT: 4    # time_emb_dims_exp = HIDDEN_SIZE * TIME_MULTIPLE
      TRAIN:
        EPOCHS: 1000
        SOLVER:
          LR: 0.0001
          WEIGHT_DECAY: 0.003
          BETAS:
            - 0.9
            - 0.999
          SCHEDULER:
            FACTOR: 0.5       # halve LR on plateau
            PATIENCE: 20      # wait 10 epochs of no improvement before reducing
            MIN_LR: 0.000001  # floor so LR never dies completely
  FM:
    TIME_MAX_POS: 1000
    CHECKPOINTS_TO_KEEP: 7
    W_TYPE: "Linear"     # Available options: Linear|Conic
    INTEGRATOR: "Euler"  # Available options: Euler|Heun
    INTEGRATOR_STEPS:
        EULER: 1000
        HEUN: 500
    UNET:
      CONDITION: "Past"
      CONDITION_HANDLING: "embed"
      NUM_RES_BLOCKS: 1
      BASE_CH: 32  # 64, 128, 256, 512
      BASE_CH_MULT: [1, 2, 4] # 32, 16, 8, 4
      APPLY_ATTENTION: [False, False, True, False]
      DROPOUT_RATE: 0.05
      TIME_EMB_MULT: 4 # 128
      TRAIN:
        EPOCHS: 200
        SOLVER:
          LR: 0.00001
          WEIGHT_DECAY: 0.001
          BETAS:
            - 0.5
            - 0.999
          SCHEDULER:
            FACTOR: 0.5       # halve LR on plateau
            PATIENCE: 10      # wait 10 epochs of no improvement before reducing
            MIN_LR: 0.000001  # floor so LR never dies completely
    DIT:
      CONDITION: "Past"
      PATCH_SIZE: 4      # With ROWS=28, COLS=24 and PATCH_SIZE=4 → 7×6 = 42 mprops seq tokens.
      HIDDEN_SIZE: 256   # model width; try 512 for more capacity
      DEPTH:       6     # number of DiT blocks
      NUM_HEADS:   4     # HIDDEN_SIZE % NUM_HEADS must == 0
      MLP_RATIO:   4.0
      DROPOUT_RATE: 0.1
      TIME_EMB_MULT: 4    # time_emb_dims_exp = HIDDEN_SIZE * TIME_MULTIPLE
      TRAIN:
        EPOCHS: 200
        SOLVER:
          LR: 0.00001
          WEIGHT_DECAY: 0.001
          BETAS:
            - 0.5
            - 0.999
          SCHEDULER:
            FACTOR: 0.5       # halve LR on plateau
            PATIENCE: 10      # wait 10 epochs of no improvement before reducing
            MIN_LR: 0.000001  # floor so LR never dies completely
  CONVRNN:
    CELL_CLASS: "ConvGRUCell"    # Options: ConvLSTMCell
    TEACHER_FORCING: True
    ENC_HIDDEN_CH: [16, 64, 64, 96, 96, 96]
    FORC_HIDDEN_CH: [96, 96, 96, 96, 96, 64, 16]
    ENC_KERNELS: [3, 3, 3, 3, 3, 3]
    FORC_KERNELS: [3, 4, 3, 4, 3, 3, 3]
    TRAIN:
      EPOCHS: 60
      SOLVER:
        LR: 0.001
        WEIGHT_DECAY: 0.0003
        BETAS:
          - 0.9
          - 0.999
METRICS:
  PRED_MPROPS_FACTOR: [1, 1, 1]
  MPROPS_COUNT: 3    # Metrics consider rho, vx, vy predictions only
  MOTION_FEATURE:
    f: 1    # Number of frames of each volume
    k: 4    # Spatial dimensions of each volume, valid for ATC grid
    s: 1
    GAMMA: 0.5 # Exponent of the power function for 1D-histogram